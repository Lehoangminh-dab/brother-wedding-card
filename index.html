<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Thiệp cưới Phuc &amp; Van - Wedding Invitation">

  <title>Phuc – Van | Wedding Invitation</title>

  <!-- Open Graph (Facebook, Zalo, Messenger, WhatsApp, iMessage, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Phuc – Van | Wedding Invitation">
  <meta property="og:description" content="Thiệp cưới Phuc &amp; Van - Wedding Invitation">
  <meta property="og:image" content="https://brother-wedding-card.vercel.app/assets/images/og-thumbnail.jpg">
  <meta property="og:url" content="https://brother-wedding-card.vercel.app/">
  <meta property="og:locale" content="vi_VN">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Phuc – Van | Wedding Invitation">
  <meta name="twitter:description" content="Thiệp cưới Phuc &amp; Van - Wedding Invitation">
  <meta name="twitter:image" content="https://brother-wedding-card.vercel.app/assets/images/og-thumbnail.jpg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=WindSong&display=swap" rel="stylesheet">

  <!-- Preload cover video for faster start on capable connections -->
  <link rel="preload" as="video" href="assets/videos/ocean_waves_background.mp4" type="video/mp4">

  <!-- Swiper CSS (for gallery carousel) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

  <!-- Remix Icon (for action buttons) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/mobile.css">
</head>

<body>

  <!-- 7. PRELOADER -->
  <div class="loader" id="loader">
    <div class="loader__spinner"></div>
  </div>

  <!-- 8. COVER SECTION -->
  <section id="cover" class="cover" aria-label="Opening">
    <div class="cover__media" role="presentation">
      <video class="cover__video" autoplay muted loop playsinline preload="auto" aria-hidden="true"></video>
      <div class="cover__bg cover__bg--fallback" role="presentation"></div>
    </div>
    <div class="cover__overlay"></div>
    <div class="cover__content">
      <div class="cover__names-block">
        <p class="cover__groom-name cover__animate" data-cover-delay="0"></p>
        <span class="cover__and cover__animate" data-cover-delay="300">AND</span>
        <p class="cover__bride-name cover__animate" data-cover-delay="600"></p>
      </div>
      <p class="cover__date cover__animate" data-cover-delay="900"></p>
    </div>
  </section>

  <main>

    <!-- 9. UNTIL THE BIG DAY -->
    <section id="until-the-day" class="until">
      <div class="until__inner" data-stagger>
        <h2 class="until__heading stagger-item"></h2>
        <div class="until__timer stagger-item" data-wedding-date="">
          <span class="until__item">
            <span class="until__value" id="countdown-days">00</span>
            <span class="until__label"></span>
          </span>
          <span class="until__item">
            <span class="until__value" id="countdown-hours">00</span>
            <span class="until__label"></span>
          </span>
          <span class="until__item">
            <span class="until__value" id="countdown-minutes">00</span>
            <span class="until__label"></span>
          </span>
          <span class="until__item">
            <span class="until__value" id="countdown-seconds">00</span>
            <span class="until__label"></span>
          </span>
        </div>
        <p class="until__message stagger-item"></p>
      </div>
    </section>

    <!-- 10. PHOTO GALLERY -->
    <section id="gallery" class="gallery" data-stagger>
      <div class="gallery__heading stagger-item">
        <h2 class="gallery__title"></h2>
      </div>

      <div class="gallery__slider swiper stagger-item">
        <div class="swiper-wrapper"></div>
        <div class="swiper-pagination"></div>
      </div>

      <div class="gallery__horizontal-slider swiper stagger-item">
        <div class="swiper-wrapper"></div>
      </div>
    </section>

    <!-- 11. SAVE THE DATE -->
    <section id="save-the-date" class="save-date">
      <div class="save-date__inner" data-stagger>
        <h2 class="save-date__heading stagger-item">
          <span class="save-date__line1"></span>
          <span class="save-date__line2"></span>
          <span class="save-date__line3"></span>
        </h2>
        <div class="save-date__divider stagger-item"></div>
        <time class="save-date__date stagger-item" datetime="2026-01-12"></time>
        <p class="save-date__time stagger-item"></p>
      </div>
    </section>

    <!-- 12. WEDDING TIMELINE -->
    <section id="timeline" class="timeline">
      <div class="timeline__inner" data-stagger>
        <p class="timeline__subtitle stagger-item"></p>
        <h2 class="timeline__heading stagger-item"></h2>
        <div class="timeline__track"></div>
      </div>
    </section>

    <!-- 13. LOCATION -->
    <section id="location" class="location">
      <div class="location__inner" data-stagger>
        <h2 class="location__heading stagger-item"></h2>
        <p class="location__venue-name text-wrap--allow stagger-item"></p>
        <address class="location__venue-address text-wrap--allow stagger-item"></address>

        <div class="location__map-wrapper stagger-item">
          <iframe class="location__map-iframe" src="" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <a class="location__map-link stagger-item" href="" target="_blank" rel="noopener noreferrer"></a>

        <div class="location__divider stagger-item"></div>

        <h3 class="location__sketch-heading text-wrap--allow stagger-item"></h3>
        <div class="location__sketch-wrapper stagger-item">
          <img class="location__sketch-img" src="" alt="" loading="lazy">
        </div>
        <p class="location__sketch-caption text-wrap--allow stagger-item"></p>
      </div>
    </section>

    <!-- 14. RSVP -->
    <section id="rsvp" class="rsvp" data-stagger>
      <h2 class="rsvp__heading stagger-item"></h2>
      <p class="rsvp__description stagger-item"></p>

      <form class="rsvp__form stagger-item" id="rsvp-form" action="#" method="post">
        <div class="rsvp__form-group">
          <label class="rsvp__label" for="rsvp-name"></label>
          <input
            class="rsvp__input"
            type="text"
            id="rsvp-name"
            name="guest_name"
            placeholder=""
            required
          >
        </div>

        <fieldset class="rsvp__fieldset rsvp__attendance">
          <legend class="rsvp__legend"></legend>
        </fieldset>

        <button class="rsvp__submit" type="submit"></button>
      </form>
    </section>

    <!-- 15. WISHES & GIFTS -->
    <section id="wishes" class="wishes" data-stagger>
      <h2 class="wishes__heading stagger-item"></h2>

      <div class="wishes__form-wrapper stagger-item">
        <form class="wishes__form" id="wishes-form" action="#" method="post">
          <div class="wishes__form-group">
            <label class="wishes__label" for="wish-name"></label>
            <input
              class="wishes__input"
              type="text"
              id="wish-name"
              name="author"
              placeholder=""
              required
            >
          </div>
          <div class="wishes__form-group">
            <label class="wishes__label" for="wish-message"></label>
            <textarea
              class="wishes__textarea"
              id="wish-message"
              name="comment"
              rows="4"
              placeholder=""
              required
            ></textarea>
          </div>
          <button class="wishes__submit" type="submit"></button>
        </form>
      </div>

      <div class="wishes__divider stagger-item"></div>

      <div id="gifts" class="wishes__gifts stagger-item">
        <h3 class="gifts__heading"></h3>
        <p class="gifts__subtitle"></p>

        <div class="gifts__cards">
          <div class="gifts__card" data-gift="groom">
            <span class="gifts__card-icon"><i class="ri-heart-line"></i></span>
            <span class="gifts__card-label"></span>
            <span class="gifts__card-subtitle"></span>
            <div class="gifts__qr-panel">
              <img class="gifts__qr-img" src="" alt="">
              <p class="gifts__account-name"></p>
              <p class="gifts__bank-name"></p>
              <p class="gifts__account-number text-wrap--allow"></p>
              <button class="gifts__download-btn" type="button" aria-label="Tải về mã QR">
                <i class="gifts__download-icon ri-download-2-line" aria-hidden="true"></i>
                <span class="gifts__download-text">Tải về mã QR</span>
              </button>
            </div>
          </div>

          <div class="gifts__card" data-gift="bride">
            <span class="gifts__card-icon"><i class="ri-flower-line"></i></span>
            <span class="gifts__card-label"></span>
            <span class="gifts__card-subtitle"></span>
            <div class="gifts__qr-panel">
              <img class="gifts__qr-img" src="" alt="">
              <p class="gifts__account-name"></p>
              <p class="gifts__bank-name"></p>
              <p class="gifts__account-number text-wrap--allow"></p>
              <button class="gifts__download-btn" type="button" aria-label="Tải về mã QR">
                <i class="gifts__download-icon ri-download-2-line" aria-hidden="true"></i>
                <span class="gifts__download-text">Tải về mã QR</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 16. CONTACT INFO -->
    <section id="contact-info" class="contact-info" data-stagger>
      <div class="contact-info__inner">
        <h2 class="contact-info__heading stagger-item"></h2>
        <p class="contact-info__phone stagger-item"></p>
        <p class="contact-info__name stagger-item"></p>
      </div>
    </section>
  </main>

  <!-- 17. THANK YOU -->
  <footer id="thank-you" class="thank-you" data-stagger>
    <h2 class="thank-you__heading stagger-item"></h2>
    <p class="thank-you__message stagger-item"></p>
  </footer>

  <!-- 18. LIGHTBOX -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" aria-label="Đóng">&times;</button>
    <button class="lightbox__prev" aria-label="Ảnh trước">&#10094;</button>
    <button class="lightbox__next" aria-label="Ảnh tiếp">&#10095;</button>
    <img class="lightbox__img" id="lightbox-img" src="" alt="">
  </div>

  <!-- Scripts: Swiper must load before main -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js"></script>

</body>
</html>

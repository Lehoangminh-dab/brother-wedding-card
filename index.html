<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">

  <title></title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@100;200;300;400;600;800&family=Quicksand:wght@300;400;600;700&family=WindSong&display=swap" rel="stylesheet">

  <!-- Swiper CSS (for gallery carousel) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

  <!-- Remix Icon (for action buttons & audio toggle) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

  <!-- ============================================
       PRELOADER
       ============================================ -->
  <div class="loader" id="loader">
    <div class="loader__spinner"></div>
  </div>

  <!-- ============================================
       HERO / HEADER SECTION
       ============================================ -->
  <header id="hero" class="hero">
    <img src="" alt="" class="hero__bg">
    <div class="hero__overlay">
      <div class="hero__content">
        <p class="hero__groom-name"></p>
        <span class="hero__ampersand">&amp;</span>
        <p class="hero__bride-name"></p>

        <div class="hero__date">
          <span class="hero__day-of-week"></span>
          <span class="hero__day"></span>
          <span class="hero__time"></span>
          <span class="hero__month-year"></span>
        </div>

        <div class="hero__venue">
          <p class="hero__venue-label"></p>
          <address class="hero__venue-address"></address>
        </div>

        <div class="hero__actions">
          <!-- Action buttons generated by main.js from config -->
        </div>
      </div>
    </div>
  </header>

  <main>

    <!-- ============================================
         COUPLE PROFILES SECTION
         ============================================ -->
    <section id="couple" class="couple">
      <div class="couple__person couple__bride">
        <figure class="couple__photo">
          <img
            src=""
            alt=""
            class="couple__img"
            width="300"
            height="300"
          >
        </figure>
        <h3 class="couple__name"></h3>
        <p class="couple__dob">
          <time datetime=""></time>
        </p>
      </div>

      <div class="couple__person couple__groom">
        <figure class="couple__photo">
          <img
            src=""
            alt=""
            class="couple__img"
            width="300"
            height="300"
          >
        </figure>
        <h3 class="couple__name"></h3>
        <p class="couple__dob">
          <time datetime=""></time>
        </p>
      </div>
    </section>

    <!-- ============================================
         SAVE THE DATE / COUNTDOWN SECTION
         ============================================ -->
    <section id="countdown" class="countdown">
      <h2 class="countdown__heading">
        <span class="countdown__icon">&#128140;</span>
      </h2>

      <div class="countdown__timer" data-wedding-date="">
        <div class="countdown__unit">
          <span class="countdown__value" id="countdown-days">--</span>
          <span class="countdown__label"></span>
        </div>
        <div class="countdown__unit">
          <span class="countdown__value" id="countdown-hours">--</span>
          <span class="countdown__label"></span>
        </div>
        <div class="countdown__unit">
          <span class="countdown__value" id="countdown-minutes">--</span>
          <span class="countdown__label"></span>
        </div>
        <div class="countdown__unit">
          <span class="countdown__value" id="countdown-seconds">--</span>
          <span class="countdown__label"></span>
        </div>
      </div>
    </section>

    <!-- ============================================
         EVENTS SECTION
         ============================================ -->
    <section id="events" class="events">
      <!-- Event cards are generated by main.js from config -->
    </section>

    <!-- ============================================
         LOVE STORY TIMELINE SECTION
         ============================================ -->
    <section id="love-story" class="love-story">
      <h2 class="love-story__heading">
        <span class="love-story__icon">&#128140;</span>
      </h2>

      <ol class="love-story__timeline">
        <!-- Milestones are generated by main.js from config -->
      </ol>
    </section>

    <!-- ============================================
         PHOTO GALLERY SECTION
         ============================================ -->
    <section id="gallery" class="gallery">
      <div class="gallery__heading">
        <p class="gallery__tagline-top"></p>
        <h2 class="gallery__title"></h2>
      </div>

      <div class="gallery__slider swiper">
        <div class="swiper-wrapper">
          <!-- Gallery slides are generated by main.js from config -->
        </div>
        <div class="swiper-pagination"></div>
      </div>
    </section>

    <!-- ============================================
         WISHES / GUESTBOOK SECTION
         ============================================ -->
    <section id="wishes" class="wishes">
      <h2 class="wishes__heading">
        <span class="wishes__icon">&#128140;</span>
      </h2>

      <!-- Existing wishes displayed here -->
      <div class="wishes__list" id="wishes-list">
        <!-- Wishes are generated by main.js from config -->
      </div>

      <!-- Wish submission form -->
      <div class="wishes__form-wrapper">
        <h3 class="wishes__form-title"></h3>
        <form class="wishes__form" id="wishes-form" action="#" method="post">
          <div class="wishes__form-group">
            <label class="wishes__label" for="wish-name"></label>
            <input
              class="wishes__input"
              type="text"
              id="wish-name"
              name="author"
              placeholder=""
              required
            >
          </div>
          <div class="wishes__form-group">
            <label class="wishes__label" for="wish-message"></label>
            <textarea
              class="wishes__textarea"
              id="wish-message"
              name="comment"
              rows="4"
              placeholder=""
              required
            ></textarea>
          </div>
          <button class="wishes__submit" type="submit"></button>
        </form>
      </div>
    </section>

    <!-- ============================================
         RSVP SECTION
         ============================================ -->
    <section id="rsvp" class="rsvp">
      <h2 class="rsvp__heading"></h2>
      <p class="rsvp__description"></p>

      <form class="rsvp__form" id="rsvp-form" action="#" method="post">

        <!-- Event selection -->
        <fieldset class="rsvp__fieldset rsvp__events">
          <legend class="rsvp__legend"></legend>
          <!-- Event options are generated by main.js from config -->
        </fieldset>

        <!-- Guest name -->
        <div class="rsvp__form-group">
          <label class="rsvp__label" for="rsvp-name"></label>
          <input
            class="rsvp__input"
            type="text"
            id="rsvp-name"
            name="guest_name"
            placeholder=""
            required
          >
        </div>

        <!-- Attendance -->
        <fieldset class="rsvp__fieldset rsvp__attendance">
          <legend class="rsvp__legend"></legend>
          <!-- Attendance options are generated by main.js from config -->
        </fieldset>

        <!-- Number of guests -->
        <fieldset class="rsvp__fieldset rsvp__guest-count">
          <legend class="rsvp__legend"></legend>
          <!-- Guest count options are generated by main.js from config -->
        </fieldset>

        <button class="rsvp__submit" type="submit"></button>
      </form>
    </section>

    <!-- ============================================
         THANK YOU SECTION
         ============================================ -->
    <section id="thank-you" class="thank-you">
      <h2 class="thank-you__heading"></h2>
      <p class="thank-you__message"></p>
    </section>

  </main>

  <!-- ============================================
       FOOTER
       ============================================ -->
  <footer id="footer" class="footer">
    <div class="footer__share">
      <h4 class="footer__share-title"></h4>
      <ul class="footer__share-links">
        <!-- Share links are generated by main.js from config -->
      </ul>
    </div>
  </footer>

  <!-- ============================================
       LIGHTBOX (for gallery fullscreen viewing)
       ============================================ -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" aria-label="Đóng">&times;</button>
    <button class="lightbox__prev" aria-label="Ảnh trước">&#10094;</button>
    <button class="lightbox__next" aria-label="Ảnh tiếp">&#10095;</button>
    <img class="lightbox__img" id="lightbox-img" src="" alt="">
  </div>

  <!-- ============================================
       AUDIO & TOGGLE BUTTON
       ============================================ -->
  <audio id="audio" preload="auto" loop></audio>
  <button class="audio-toggle" id="audio-toggle" aria-label="Bật/tắt nhạc">
    <i class="ri-volume-mute-fill"></i>
  </button>

  <!-- Scripts: Swiper must load before main -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js"></script>

</body>
</html>

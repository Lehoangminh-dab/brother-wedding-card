<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Thiệp cưới Phuc &amp; Van - Wedding Invitation">

  <title>Phuc – Van | Wedding Invitation</title>

  <!-- Open Graph (Facebook, Zalo, Messenger, WhatsApp, iMessage, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Phuc – Van | Wedding Invitation">
  <meta property="og:description" content="Thiệp cưới Phuc &amp; Van - Wedding Invitation">
  <meta property="og:image" content="https://brother-wedding-card.vercel.app/assets/images/og-thumbnail.jpg">
  <meta property="og:url" content="https://brother-wedding-card.vercel.app/">
  <meta property="og:locale" content="vi_VN">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Phuc – Van | Wedding Invitation">
  <meta name="twitter:description" content="Thiệp cưới Phuc &amp; Van - Wedding Invitation">
  <meta name="twitter:image" content="https://brother-wedding-card.vercel.app/assets/images/og-thumbnail.jpg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=Noto+Serif+Display:wght@100;200;300;400;600;800&family=Quicksand:wght@300;400;600;700&family=Montserrat:wght@400;500;600&family=WindSong&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">

  <!-- Swiper CSS (for gallery carousel) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

  <!-- Remix Icon (for action buttons) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

  <!-- ============================================
       PRELOADER
       ============================================ -->
  <div class="loader" id="loader">
    <div class="loader__spinner"></div>
  </div>

  <!-- ============================================
       COVER SECTION (names + date only)
       Canva-style: looped video bg, staggered text animations
       ============================================ -->
  <section id="cover" class="cover" aria-label="Opening">
    <div class="cover__media" role="presentation">
      <video class="cover__video" autoplay muted loop playsinline aria-hidden="true"></video>
      <div class="cover__bg cover__bg--fallback" role="presentation"></div>
    </div>
    <div class="cover__overlay"></div>
    <div class="cover__content">
      <div class="cover__names-block">
        <p class="cover__groom-name cover__animate" data-cover-delay="0"></p>
        <span class="cover__and cover__animate" data-cover-delay="300">AND</span>
        <p class="cover__bride-name cover__animate" data-cover-delay="600"></p>
      </div>
      <p class="cover__date cover__animate" data-cover-delay="900"></p>
    </div>
  </section>

  <main>

    <!-- ============================================
         SAVE THE DATE / COUNTDOWN SECTION
         ============================================ -->
    <section id="countdown" class="countdown">
      <h2 class="countdown__heading">
        <span class="countdown__icon">&#128140;</span>
      </h2>

      <div class="countdown__timer" data-wedding-date="">
        <div class="countdown__unit">
          <span class="countdown__value" id="countdown-days">--</span>
          <span class="countdown__label"></span>
        </div>
        <div class="countdown__unit">
          <span class="countdown__value" id="countdown-hours">--</span>
          <span class="countdown__label"></span>
        </div>
        <div class="countdown__unit">
          <span class="countdown__value" id="countdown-minutes">--</span>
          <span class="countdown__label"></span>
        </div>
        <div class="countdown__unit">
          <span class="countdown__value" id="countdown-seconds">--</span>
          <span class="countdown__label"></span>
        </div>
      </div>
    </section>

    <!-- ============================================
         PHOTO GALLERY SECTION
         ============================================ -->
    <section id="gallery" class="gallery">
      <div class="gallery__heading">
        <p class="gallery__tagline-top"></p>
        <h2 class="gallery__title"></h2>
      </div>

      <div class="gallery__slider swiper">
        <div class="swiper-wrapper">
          <!-- Gallery slides are generated by main.js from config -->
        </div>
        <div class="swiper-pagination"></div>
      </div>
    </section>

    <!-- ============================================
         WISHES / GUESTBOOK SECTION
         ============================================ -->
    <section id="wishes" class="wishes">
      <h2 class="wishes__heading">
        <span class="wishes__icon">&#128140;</span>
      </h2>

      <!-- Existing wishes displayed here -->
      <div class="wishes__list" id="wishes-list">
        <!-- Wishes are generated by main.js from config -->
      </div>

      <!-- Wish submission form -->
      <div class="wishes__form-wrapper">
        <h3 class="wishes__form-title"></h3>
        <form class="wishes__form" id="wishes-form" action="#" method="post">
          <div class="wishes__form-group">
            <label class="wishes__label" for="wish-name"></label>
            <input
              class="wishes__input"
              type="text"
              id="wish-name"
              name="author"
              placeholder=""
              required
            >
          </div>
          <div class="wishes__form-group">
            <label class="wishes__label" for="wish-message"></label>
            <textarea
              class="wishes__textarea"
              id="wish-message"
              name="comment"
              rows="4"
              placeholder=""
              required
            ></textarea>
          </div>
          <button class="wishes__submit" type="submit"></button>
        </form>
      </div>
    </section>

    <!-- ============================================
         RSVP SECTION
         ============================================ -->
    <section id="rsvp" class="rsvp">
      <h2 class="rsvp__heading"></h2>
      <p class="rsvp__description"></p>

      <form class="rsvp__form" id="rsvp-form" action="#" method="post">

        <!-- Event selection -->
        <fieldset class="rsvp__fieldset rsvp__events">
          <legend class="rsvp__legend"></legend>
          <!-- Event options are generated by main.js from config -->
        </fieldset>

        <!-- Guest name -->
        <div class="rsvp__form-group">
          <label class="rsvp__label" for="rsvp-name"></label>
          <input
            class="rsvp__input"
            type="text"
            id="rsvp-name"
            name="guest_name"
            placeholder=""
            required
          >
        </div>

        <!-- Attendance -->
        <fieldset class="rsvp__fieldset rsvp__attendance">
          <legend class="rsvp__legend"></legend>
          <!-- Attendance options are generated by main.js from config -->
        </fieldset>

        <!-- Number of guests -->
        <fieldset class="rsvp__fieldset rsvp__guest-count">
          <legend class="rsvp__legend"></legend>
          <!-- Guest count options are generated by main.js from config -->
        </fieldset>

        <button class="rsvp__submit" type="submit"></button>
      </form>
    </section>

    <!-- ============================================
         THANK YOU SECTION
         ============================================ -->
    <section id="thank-you" class="thank-you">
      <h2 class="thank-you__heading"></h2>
      <p class="thank-you__message"></p>
    </section>

  </main>

  <!-- ============================================
       LIGHTBOX (for gallery fullscreen viewing)
       ============================================ -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" aria-label="Đóng">&times;</button>
    <button class="lightbox__prev" aria-label="Ảnh trước">&#10094;</button>
    <button class="lightbox__next" aria-label="Ảnh tiếp">&#10095;</button>
    <img class="lightbox__img" id="lightbox-img" src="" alt="">
  </div>

  <!-- Scripts: Swiper must load before main -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js"></script>

</body>
</html>

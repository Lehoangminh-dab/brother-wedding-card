<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WindSong SVG Tool</title>
    <style>
      :root {
        --bg: #f8f4ea;
        --panel: #fffaf0;
        --ink: #1f1a17;
        --muted: #7a6b62;
        --accent: #c45d2d;
        --line: #e4d7c5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 900px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 10%, #fff4de 0, transparent 28%),
          radial-gradient(circle at 90% 90%, #ffe8c5 0, transparent 32%),
          var(--bg);
        padding: 24px;
      }

      @media only screen and (min-width: 1600px) {
        body {
          min-height: 1080px;
        }
      }

      @media only screen and (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
        body {
          min-height: 1024px;
        }
      }

      @media only screen and (max-width: 767px) {
        body {
          min-height: 844px;
        }
      }

      @media only screen and (max-width: 480px) {
        body {
          min-height: 780px;
        }
      }

      .wrap {
        max-width: 960px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.4rem, 3vw, 2rem);
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 12px;
      }

      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        background: #fff;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 12px 16px;
        font-weight: 700;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status {
        min-height: 20px;
        color: var(--muted);
      }

      .preview {
        min-height: 140px;
        border: 1px dashed var(--line);
        border-radius: 10px;
        background: #fff;
        padding: 12px;
        overflow: auto;
      }

      .preview svg {
        max-width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h1>WindSong SVG Generator</h1>
        <p>
          Type any text, generate a WindSong outline SVG, preview it, then
          download.
        </p>
      </section>

      <section class="card">
        <form id="generator-form">
          <label>
            Text
            <textarea
              id="text"
              placeholder="Enter text to convert"
              required
            ></textarea>
          </label>

          <div class="grid">
            <label>
              File name (optional)
              <input id="filename" type="text" placeholder="my-name.svg" />
            </label>

            <label>
              Font size
              <input id="fontSize" type="number" min="1" step="1" value="200" />
            </label>

            <label>
              Fill color
              <input id="fill" type="text" value="#ffffff" />
            </label>
          </div>

          <button id="generate" type="submit">Generate SVG</button>
          <div class="status" id="status"></div>
        </form>
      </section>

      <section class="card">
        <h2>Preview</h2>
        <div class="preview" id="preview"></div>
      </section>
    </div>

    <script>
      const form = document.getElementById("generator-form");
      const textInput = document.getElementById("text");
      const filenameInput = document.getElementById("filename");
      const fontSizeInput = document.getElementById("fontSize");
      const fillInput = document.getElementById("fill");
      const statusEl = document.getElementById("status");
      const previewEl = document.getElementById("preview");
      const button = document.getElementById("generate");

      const API_URL = `${window.location.origin}/api/windsong-svg`;

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function pickFilenameFromDisposition(headerValue) {
        if (!headerValue) return "windsong.svg";
        const match = /filename="?([^";]+)"?/i.exec(headerValue);
        return match ? match[1] : "windsong.svg";
      }

      async function generateSvg(payload) {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          let message = `Request failed (${response.status})`;
          try {
            const data = await response.json();
            if (data && data.error) message = data.error;
          } catch {
            // Ignore non-JSON errors.
          }
          throw new Error(message);
        }

        const svg = await response.text();
        const disposition = response.headers.get("Content-Disposition");
        const suggestedFilename = pickFilenameFromDisposition(disposition);
        return { svg, suggestedFilename };
      }

      function downloadSvg(svg, filename) {
        const blob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const payload = {
          text: textInput.value,
          filename: filenameInput.value,
          fontSize: Number(fontSizeInput.value || 200),
          fill: fillInput.value || "#ffffff",
        };

        button.disabled = true;
        setStatus("Generating...");

        try {
          const { svg, suggestedFilename } = await generateSvg(payload);
          previewEl.innerHTML = svg;
          downloadSvg(svg, suggestedFilename);
          setStatus(`Generated and downloaded ${suggestedFilename}`);
        } catch (error) {
          setStatus(error.message || "Failed to generate SVG");
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
